; PlatformIO Project Configuration File -- tesserae-photopainter-7.3-bin-client
;
; Target hardware: Waveshare ESP32-S3 PhotoPainter
;   - Module: ESP32-S3-WROOM-1-N16R8 (16 MB flash, 8 MB octal PSRAM)
;   - Panel:  7.3" 800x480 6-color Spectra E6, single SPI controller
;   - PMIC:   AXP2101 (battery sense + panel rail over I2C; no ADC divider)
;   - Slot:   microSD (SDMMC 4-bit) -- unused in firmware v1
;
; The PlatformIO board variant esp32-s3-devkitc1-n16r8 matches the module
; (16 MB flash, 8 MB octal PSRAM) exactly. If you ever cut a multi-slot OTA
; build, widen the factory partition in partitions.csv.

[env:tesserae-photopainter-73-bin-client]
platform = espressif32
board = esp32-s3-devkitc1-n16r8
framework = espidf

; FW_VERSION is reported in the status heartbeat. Bump on every release.
build_flags =
    -DFW_VERSION=\"0.2.1\"

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, direct

board_build.partitions = partitions.csv
board_build.flash_size = 16MB

; sdkconfig.defaults at the project root is picked up automatically by the
; ESP-IDF integration; no extra path needed here.
